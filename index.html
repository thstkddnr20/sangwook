<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fa;
        }

        /* HERO 영역 */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            padding: 20px;
        }

        .hero h1 {
            font-size: 48px;
            margin: 0;
        }

        .hero h1 span {
            color: #ffd700;
        }

        .hero p {
            font-size: 20px;
            margin-top: 20px;
            max-width: 600px;
            line-height: 1.6;
            opacity: 0.95;
        }

        .skills {
            margin-top: 30px;
        }

        .skills span {
            display: inline-block;
            margin: 5px;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 14px;
        }

        .hero-btn {
            margin-top: 40px;
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            background: white;
            color: #4f46e5;
            cursor: pointer;
            transition: 0.3s;
        }

        .hero-btn:hover {
            background: #ffd700;
            color: black;
        }

        /* 프로젝트 섹션 */
        .projects {
            padding: 80px 20px;
            text-align: center;
        }

        .projects h2 {
            margin-bottom: 40px;
            font-size: 28px;
        }

        .card-container {
            display: flex;
            justify-content: center;
        }

        .card {
            width: 320px;
            padding: 25px;
            border-radius: 16px;
            background: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-decoration: none;
            color: black;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .badge {
            display: inline-block;
            margin-bottom: 12px;
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 20px;
            background: #4f46e5;
            color: white;
        }
        .card-container {
    	display: flex;
    	justify-content: center;
    	gap: 30px;
    	flex-wrap: wrap;
        }
    </style>
</head>
<body>

<!-- HERO -->
<section class="hero">
    <h1>안녕하세요, <span>손상욱</span>입니다</h1>
    <p>
        도메인 중심 설계와 아키텍처 개선을 고민하며<br>
        더 나은 구조와 성능을 추구하는 백엔드 개발자입니다.
    </p>

    <div class="skills">
        <span>Backend</span>
        <span>Spring</span>
        <span>Architecture</span>
        <span>Performance</span>
    </div>

    <button class="hero-btn" onclick="document.getElementById('projects').scrollIntoView({behavior:'smooth'})">
        프로젝트 보기
    </button>
</section>

<!-- Projects -->
<section class="projects" id="projects">
    <h2>PROJECTS</h2>

    <div class="card-container" style="gap: 30px; flex-wrap: wrap;">
        
        <!-- 냥토닥 -->
        <a href="projects/nyangtodac/index.html" class="card">
            <span class="badge">PROJECT</span>
            <h3>냥토닥</h3>
            <p style="font-size:14px; color:gray; margin-bottom:10px;">
                2025.08 ~ 2025.11 (4개월)
            </p>
            <p>
                도메인 중심 설계를 기반으로<br>
                아키텍처 개선 및 구조 재정의
            </p>
        </a>

        <!-- 파도 -->
        <a href="projects/pado/index.html" class="card">
            <span class="badge">PROJECT</span>
            <h3>파도</h3>
            <p style="font-size:14px; color:gray; margin-bottom:10px;">
                2025.12 ~ 2026.02 (3개월)<br>
                2026.02 ~ 운영중
            </p>
            <p>
                실서비스 운영을 고려한<br>
                성능 개선 및 인프라 설계
            </p>
        </a>

    </div>
</section>

</body>
</html>
